<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1500px;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
}

.poster {
  width: 1500px;
  height: 2100px;
  position: relative;
  overflow: hidden;
  background: #0d2a0a;
}

.bg-gradient {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%, #1a5c0e 0%, transparent 60%),
    radial-gradient(ellipse 80% 50% at 20% 100%, #0a3205 0%, transparent 50%),
    radial-gradient(ellipse 80% 50% at 80% 100%, #0a3205 0%, transparent 50%),
    linear-gradient(180deg, #071a04 0%, #0d2a0a 30%, #142e10 60%, #0a1e08 100%);
}

.light-beam {
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 1000px;
  height: 1200px;
  background: radial-gradient(ellipse at 50% 0%, rgba(180,255,100,0.12) 0%, transparent 70%);
}

.light-spot {
  position: absolute;
  top: 160px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,220,80,0.08) 0%, transparent 70%);
}

.deco-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(150,255,80,0.1);
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(181,255,96,0.6);
}

/* 顶部品牌 */
.top-label {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

.brand-tag {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.85);
  font-size: 26px;
  letter-spacing: 4px;
  padding: 14px 44px;
  border-radius: 60px;
}

/* 标题 */
.title-block {
  position: absolute;
  top: 320px;
  left: 0; right: 0;
  text-align: center;
  z-index: 20;
  padding: 0 80px;
}

.eyebrow {
  font-size: 28px;
  color: rgba(180,255,120,0.8);
  letter-spacing: 6px;
  margin-bottom: 36px;
  font-weight: 400;
}

.main-title-line1 {
  font-size: 144px;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  text-shadow: 0 0 80px rgba(120,255,60,0.4), 0 8px 40px rgba(0,0,0,0.8);
  margin-bottom: 16px;
  letter-spacing: 4px;
}

.main-title-line1 .highlight {
  color: #b5ff60;
  text-shadow: 0 0 60px rgba(181,255,96,0.7), 0 8px 40px rgba(0,0,0,0.8);
}

.main-title-line2 {
  font-size: 116px;
  font-weight: 900;
  color: #ffcc00;
  line-height: 1;
  text-shadow: 0 0 80px rgba(255,200,0,0.5), 0 8px 40px rgba(0,0,0,0.8);
  letter-spacing: 4px;
}

.title-sub {
  margin-top: 40px;
  font-size: 32px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 6px;
}

/* 蘑菇场景 */
.mushroom-scene {
  position: absolute;
  bottom: 420px;
  left: 0; right: 0;
  height: 500px;
}

/* 分隔线 */
.divider-area {
  position: absolute;
  top: 1040px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 30px;
  z-index: 20;
}

.divider-line-h {
  height: 2px;
  width: 240px;
  background: linear-gradient(to right, transparent, rgba(181,255,96,0.5));
  border-radius: 2px;
}
.divider-line-h.r { background: linear-gradient(to left, transparent, rgba(181,255,96,0.5)); }
.divider-diamond {
  width: 16px; height: 16px;
  background: #b5ff60;
  transform: rotate(45deg);
  box-shadow: 0 0 20px rgba(181,255,96,0.8);
}

/* 内容区 */
.content-section {
  position: absolute;
  top: 1090px;
  left: 80px; right: 80px;
  z-index: 20;
}

.session-block { margin-bottom: 48px; }

.session-title-row {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 28px;
}

.session-label {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 4px;
  color: #b5ff60;
  text-transform: uppercase;
}

.session-time-badge {
  background: rgba(181,255,96,0.15);
  border: 1px solid rgba(181,255,96,0.3);
  color: #b5ff60;
  font-size: 26px;
  padding: 6px 24px;
  border-radius: 40px;
}

.session-block.pm .session-label { color: #ffd060; }
.session-block.pm .session-time-badge {
  background: rgba(255,208,96,0.15);
  border-color: rgba(255,208,96,0.3);
  color: #ffd060;
}

.activities-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

.activities-grid.two-col { grid-template-columns: 1fr 1fr; }

.activity-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 28px;
  padding: 36px 28px;
  text-align: center;
}

.act-emoji { font-size: 56px; margin-bottom: 16px; display: block; }
.act-name { font-size: 30px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.act-desc { font-size: 22px; color: rgba(255,255,255,0.45); line-height: 1.5; }

/* 树木剪影 */
.forest-silhouette {
  position: absolute;
  bottom: 390px;
  left: 0; right: 0;
  height: 240px;
  z-index: 15;
}

/* 底部信息 */
.info-section {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 400px;
  z-index: 20;
}

.info-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.85) 40%, rgba(0,0,0,0.97) 100%);
}

.info-content {
  position: absolute;
  bottom: 70px;
  left: 0; right: 0;
  padding: 0 90px;
}

.info-items {
  display: flex;
  gap: 0;
  margin-bottom: 40px;
}

.info-item {
  flex: 1;
  display: flex;
  align-items: flex-start;
  gap: 24px;
}

.info-item + .info-item {
  border-left: 1px solid rgba(255,255,255,0.1);
  padding-left: 56px;
  margin-left: 56px;
}

.info-icon-box {
  width: 76px; height: 76px;
  background: rgba(181,255,96,0.15);
  border: 1px solid rgba(181,255,96,0.3);
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
}

.info-label-text {
  font-size: 22px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 3px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.info-value-text {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  line-height: 1.6;
}

.footer-brand {
  text-align: center;
  font-size: 22px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 4px;
}
</style>
</head>
<body>
