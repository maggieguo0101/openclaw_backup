<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #ffffff;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    padding: 40px 60px 60px 60px;
    width: 960px;
  }

  h2 {
    text-align: center;
    color: #1a1a1a;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  svg {
    display: block;
    margin: 0 auto;
  }

  /* 通用节点 */
  .box rect {
    stroke-width: 1.5;
    rx: 4;
  }
  .box text {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    dominant-baseline: middle;
    text-anchor: middle;
  }
  .box text.sub {
    font-size: 11px;
    fill: #555;
  }

  /* 箭头 */
  .arrow {
    stroke: #555;
    stroke-width: 1.5;
    fill: none;
    marker-end: url(#arrowhead);
  }
  .arrow-label {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 11px;
    fill: #666;
    text-anchor: middle;
  }

  /* 菱形判断 */
  .diamond polygon {
    stroke-width: 1.5;
  }
  .diamond text {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 12px;
    dominant-baseline: middle;
    text-anchor: middle;
  }
</style>
</head>
<body>
<h2>AIBD 签约 & 上团单 × OpenClaw 企微自动化 — 整体架构</h2>
<svg width="840" height="1200" viewBox="0 0 840 1200">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a73e8"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#188038"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e37400"/>
    </marker>
  </defs>

  <!-- ① 后台任务系统 -->
  <g class="box">
    <rect x="270" y="20" width="300" height="52" rx="4" fill="#e8f0fe" stroke="#1a73e8"/>
    <text x="420" y="42" fill="#1a1a1a" font-weight="600">⚙️ 后台任务系统</text>
    <text x="420" y="60" class="sub">批量触发签约 / 上团单任务</text>
  </g>

  <!-- 箭头 ①→② -->
  <line x1="420" y1="72" x2="420" y2="100" class="arrow"/>
  <text x="438" y="90" class="arrow-label">批量触发指令</text>

  <!-- ② 销售侧 OpenClaw -->
  <g class="box">
    <rect x="160" y="100" width="520" height="80" rx="4" fill="#fce8e6" stroke="#d93025"/>
    <text x="420" y="126" fill="#1a1a1a" font-weight="600">🐾 销售侧 OpenClaw（核心 Agent）</text>
    <text x="420" y="146" class="sub">管理 2000 个商家群 · 每群独立 Session · 超时提醒 3h（22:00~08:00 静默）</text>
    <!-- Skills -->
    <rect x="172" y="158" width="112" height="18" rx="3" fill="#d93025" opacity="0.15" stroke="#d93025" stroke-width="1"/>
    <text x="228" y="167" font-size="10" fill="#d93025" text-anchor="middle" dominant-baseline="middle">🔍 认领状态查询</text>
    <rect x="292" y="158" width="88" height="18" rx="3" fill="#d93025" opacity="0.15" stroke="#d93025" stroke-width="1"/>
    <text x="336" y="167" font-size="10" fill="#d93025" text-anchor="middle" dominant-baseline="middle">📝 签约 Skill</text>
    <rect x="388" y="158" width="96" height="18" rx="3" fill="#d93025" opacity="0.15" stroke="#d93025" stroke-width="1"/>
    <text x="436" y="167" font-size="10" fill="#d93025" text-anchor="middle" dominant-baseline="middle">🛒 上团单 Skill</text>
    <rect x="492" y="158" width="100" height="18" rx="3" fill="#d93025" opacity="0.15" stroke="#d93025" stroke-width="1"/>
    <text x="542" y="167" font-size="10" fill="#d93025" text-anchor="middle" dominant-baseline="middle">🔔 销售通知 Skill</text>
  </g>

  <!-- 箭头 ②→③ -->
  <line x1="420" y1="180" x2="420" y2="210" class="arrow"/>
  <text x="480" y="200" class="arrow-label">消息收发 / 回调</text>

  <!-- ③ 深海平台 -->
  <g class="box">
    <rect x="245" y="210" width="350" height="52" rx="4" fill="#e6f4ea" stroke="#188038"/>
    <text x="420" y="232" fill="#1a1a1a" font-weight="600">🌊 深海平台（消息中转层）</text>
    <text x="420" y="250" class="sub">企微消息收发中转 · 管理王晓慧账号 · 限流 & 鉴权</text>
  </g>

  <!-- 箭头 ③→④ -->
  <line x1="420" y1="262" x2="420" y2="290" class="arrow"/>
  <text x="490" y="280" class="arrow-label">王晓慧账号收发</text>

  <!-- ④ 王晓慧 -->
  <g class="box">
    <rect x="285" y="290" width="270" height="50" rx="4" fill="#e6f4ea" stroke="#188038"/>
    <text x="420" y="311" fill="#1a1a1a" font-weight="600">🤖 王晓慧（企微机器人账号）</text>
    <text x="420" y="329" class="sub">消息实际载体 · 在各商家群内代表销售发言</text>
  </g>

  <!-- 箭头 ④→⑤ -->
  <line x1="420" y1="340" x2="420" y2="368" class="arrow"/>
  <text x="490" y="358" class="arrow-label">被拉入 2000 个商家群</text>

  <!-- ⑤ 商家企微群 -->
  <g class="box">
    <rect x="160" y="368" width="520" height="50" rx="4" fill="#fff8e1" stroke="#f9a825"/>
    <text x="420" y="388" fill="#1a1a1a" font-weight="600">💬 商家企微群（× 2000）</text>
    <text x="420" y="406" class="sub">王晓慧 🤖  ⟷ 沟通 ⟷  商家 🏪</text>
  </g>

  <!-- 箭头 ⑤→⑥ 判断 -->
  <line x1="420" y1="418" x2="420" y2="448" class="arrow"/>

  <!-- ⑥ 判断菱形：是否已认领 -->
  <g class="diamond">
    <polygon points="420,448  530,490  420,532  310,490" fill="#fff3e0" stroke="#e37400" stroke-width="1.5"/>
    <text x="420" y="486" fill="#1a1a1a" font-size="13" font-weight="600" text-anchor="middle" dominant-baseline="middle">商家是否已认领？</text>
  </g>

  <!-- 未认领 → 左 -->
  <line x1="310" y1="490" x2="170" y2="490" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>
  <text x="240" y="482" class="arrow-label" fill="#1a73e8">未认领</text>

  <!-- 已认领 → 右 -->
  <line x1="530" y1="490" x2="670" y2="490" stroke="#d93025" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="600" y="482" class="arrow-label" fill="#d93025">已认领</text>

  <!-- 左支：未认领流程 -->
  <g class="box">
    <rect x="60" y="515" width="220" height="44" rx="4" fill="#e8f0fe" stroke="#1a73e8"/>
    <text x="170" y="533" fill="#1a1a1a" font-weight="600" font-size="12">📲 发送签约小程序链接</text>
    <text x="170" y="550" class="sub">引导商家自助完成签约</text>
  </g>
  <line x1="170" y1="490" x2="170" y2="515" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>

  <line x1="170" y1="559" x2="170" y2="585" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>

  <g class="box">
    <rect x="60" y="585" width="220" height="44" rx="4" fill="#e8f0fe" stroke="#1a73e8"/>
    <text x="170" y="603" fill="#1a1a1a" font-weight="600" font-size="12">✅ 商家完成签约</text>
    <text x="170" y="620" class="sub">签约审批通过回调</text>
  </g>

  <line x1="170" y1="629" x2="170" y2="655" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>

  <g class="box">
    <rect x="60" y="655" width="220" height="44" rx="4" fill="#e8f0fe" stroke="#1a73e8"/>
    <text x="170" y="673" fill="#1a1a1a" font-weight="600" font-size="12">🛒 自动提交上团单</text>
    <text x="170" y="690" class="sub">收集团单字段 → 调用上团单 Skill</text>
  </g>

  <line x1="170" y1="699" x2="170" y2="725" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>

  <g class="box">
    <rect x="60" y="725" width="220" height="44" rx="4" fill="#e8f0fe" stroke="#1a73e8"/>
    <text x="170" y="743" fill="#1a1a1a" font-weight="600" font-size="12">🎉 群内通知商家</text>
    <text x="170" y="760" class="sub">上团单已提交，流程完成</text>
  </g>

  <!-- 右支：已认领流程 -->
  <g class="box">
    <rect x="560" y="515" width="220" height="44" rx="4" fill="#fce8e6" stroke="#d93025"/>
    <text x="670" y="533" fill="#1a1a1a" font-weight="600" font-size="12">📋 请商家提供材料</text>
    <text x="670" y="550" class="sub">营业执照 + 身份证</text>
  </g>
  <line x1="670" y1="490" x2="670" y2="515" stroke="#d93025" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <line x1="670" y1="559" x2="670" y2="585" stroke="#d93025" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <g class="box">
    <rect x="560" y="585" width="220" height="44" rx="4" fill="#fce8e6" stroke="#d93025"/>
    <text x="670" y="603" fill="#1a1a1a" font-weight="600" font-size="12">📨 收到材料</text>
    <text x="670" y="620" class="sub">整理材料清单（图片/文件链接）</text>
  </g>

  <line x1="670" y1="629" x2="670" y2="655" stroke="#d93025" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 大象通知框 -->
  <g class="box">
    <rect x="560" y="655" width="220" height="44" rx="4" fill="#fff8e1" stroke="#f9a825"/>
    <text x="670" y="673" fill="#1a1a1a" font-weight="600" font-size="12">🐘 大象通知真人销售</text>
    <text x="670" y="690" class="sub">商家名称 + 群链接 + 材料清单</text>
  </g>

  <line x1="670" y1="699" x2="670" y2="725" stroke="#e37400" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>

  <!-- 真人销售跟进 -->
  <g class="box">
    <rect x="560" y="725" width="220" height="60" rx="4" fill="#e6f4ea" stroke="#188038"/>
    <text x="670" y="746" fill="#1a1a1a" font-weight="600" font-size="12">👤 真人销售跟进</text>
    <text x="670" y="763" class="sub">登录后台代商家完成认领</text>
    <text x="670" y="778" class="sub">确认材料 → 提交审批</text>
  </g>

  <!-- 超时提醒标注 -->
  <rect x="330" y="820" width="180" height="38" rx="4" fill="#f1f3f4" stroke="#bbb" stroke-dasharray="4,3"/>
  <text x="420" y="836" font-size="11" fill="#555" text-anchor="middle" dominant-baseline="middle">⏰ 超时提醒机制</text>
  <text x="420" y="851" font-size="10" fill="#888" text-anchor="middle" dominant-baseline="middle">3h 无回复触发 · 22:00~08:00 静默</text>

  <!-- 超时提醒连线（虚线） -->
  <line x1="420" y1="532" x2="360" y2="820" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="420" y1="603" x2="370" y2="820" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- 图例 -->
  <rect x="60" y="900" width="720" height="60" rx="6" fill="#f8f9fa" stroke="#e0e0e0"/>
  <text x="80" y="920" font-size="11" fill="#555" font-weight="600">图例</text>
  <rect x="80" y="930" width="14" height="14" rx="2" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="100" y="941" font-size="11" fill="#555">未认领商家流程（自助签约）</text>
  <rect x="270" y="930" width="14" height="14" rx="2" fill="#fce8e6" stroke="#d93025" stroke-width="1.5"/>
  <text x="290" y="941" font-size="11" fill="#555">已认领商家流程（人工跟进）</text>
  <rect x="460" y="930" width="14" height="14" rx="2" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
  <text x="480" y="941" font-size="11" fill="#555">大象通知</text>
  <rect x="580" y="930" width="14" height="14" rx="2" fill="#f1f3f4" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="941" font-size="11" fill="#555">超时提醒（虚线）</text>

</svg>
</body>
</html>
