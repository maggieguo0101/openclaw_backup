<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
@import url('data:text/css,');
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1123px;
  height: 794px;
  overflow: hidden;
  background: #fef5e4;
  font-family: 'FangSong','STFangsong','SimSun',serif;
  position: relative;
}

/* 背景金色纹理 */
.bg {
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(45deg,  rgba(210,160,40,0.06) 0,rgba(210,160,40,0.06) 1px, transparent 0, transparent 50%),
    repeating-linear-gradient(-45deg, rgba(210,160,40,0.06) 0,rgba(210,160,40,0.06) 1px, transparent 0, transparent 50%);
  background-size: 20px 20px;
}

/* 外框 */
.frame-outer { position:absolute; inset:8px;  border:3px solid #c0392b; border-radius:5px; pointer-events:none; z-index:50; }
.frame-inner { position:absolute; inset:14px; border:1.5px dashed #d4a827; border-radius:3px; pointer-events:none; z-index:50; }

/* 四角回字纹 */
.corner {
  position:absolute; width:52px; height:52px; z-index:51;
}
</style>
</head>

<div class="bg"></div>
